  <path d="M30 40 L30 65 L50 55 L70 65 L70 40" 
        fill="none" 
        stroke="white" 
        stroke-width="3"
        stroke-linejoin="round"/>
  <!-- Flag pole -->
  <path d="M28 35 L28 25" 
        stroke="white" 
        stroke-width="3"
        stroke-linecap="round"/>
  <!-- Flag wave -->
  <path d="M35 28 Q42 25 50 28 Q58 31 65 28" 
        fill="none" 
        stroke="white" 
        stroke-width="2"
        stroke-linecap="round"/>
</svg>